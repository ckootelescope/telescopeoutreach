name: "Follow-up: 2 - Specmade"
 
on:
  schedule:
    - cron: '41 15 20 5 *'
  workflow_dispatch:
 
jobs:
  send-followup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Run follow-up script
        id: followup
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          COMPANY_NAME: "Specmade"
          FOUNDER_NAME: "Matt Pierce"
          FOUNDER_EMAIL: "matt@specmade.com"
          COMPANY_DOMAIN: "specmade.com"
          ORIGINAL_THREAD_ID: "19e3be5d204d4ca1"
          ORIGINAL_MESSAGE_ID: "19e3be5d204d4ca1"
          EMAIL_SUBJECT: "Telescope Partners <> Specmade Intro"
          EMAIL_BODY: "<div>Hey Matt,<br><br>Was thinking about the home inspection space and one thing that struck me is how fragmented the market is. Most inspectors are independent or small shops, which means the product needs to just work out of the box. The fact that you built offline mode from the start tells me you really understand the user.<br><br>Would love to get 20 minutes if you're open to it.</div>"
          EMAIL_NUMBER: "2"
        run: node scripts/send_followup.js
 
      - name: Cancel remaining cadence
        if: steps.followup.outputs.result == 'REPLIED' || steps.followup.outputs.result == 'BOUNCED'
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ steps.followup.outputs.result }}';
            const company = 'specmade';
            console.log(result + ': Cleaning up remaining workflows for ' + company);
            const { data: contents } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: '.github/workflows'
            });
            const companyFiles = contents.filter(f => f.name.startsWith('followup_' + company + '_'));
            for (const file of companyFiles) {
              console.log('Deleting: ' + file.name);
              await github.rest.repos.deleteFile({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: file.path,
                message: '[auto] ' + result + ' - cancel cadence for ' + company,
                sha: file.sha
              });
            }
 
      - name: Clean up this workflow
        if: steps.followup.outputs.result == 'DRAFT_CREATED' || steps.followup.outputs.result == 'REPLIED' || steps.followup.outputs.result == 'BOUNCED'
        uses: actions/github-script@v7
        with:
          script: |
            const path = '.github/workflows/followup_specmade_email2.yml';
            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: path
            });
            await github.rest.repos.deleteFile({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: path,
              message: '[auto] completed - Email 2 for COMPANY_NAME_VALUE',
              sha: file.sha
            });
