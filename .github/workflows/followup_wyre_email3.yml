name: "Follow-up: Email 3 - Wyre"

on:
  schedule:
    - cron: '37 15 27 5 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-followup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run follow-up script
        id: followup
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          Wyre: "Wyre"
          FOUNDER_NAME: "Sunil"
          FOUNDER_EMAIL: "sunil.dorairajan@wyreai.io"
          COMPANY_DOMAIN: "wyreai.io"
          ORIGINAL_THREAD_ID: "19e438f5654940cd"
          ORIGINAL_MESSAGE_ID: "19e438f5654940cd"
          EMAIL_SUBJECT: "Chat Construction? | Telescope Partners intro"
          EMAIL_BODY: "<div>Sunil - Harrison on our team spent years at Procore and has a unique view on what makes construction software sticky. Happy to make the intro if it'd be useful.<br><br>If now isn't the right time, totally understand - but would love to connect whenever.</div>"
          Email 3: "3"
        run: node scripts/send_followup.js

      - name: Cancel remaining cadence
        if: steps.followup.outputs.result == 'REPLIED' || steps.followup.outputs.result == 'BOUNCED'
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ steps.followup.outputs.result }}';
            const company = 'wyre';
            console.log(result + ': Cleaning up remaining workflows for ' + company);
            const { data: contents } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: '.github/workflows'
            });
            const companyFiles = contents.filter(f => f.name.startsWith('followup_' + company + '_'));
            for (const file of companyFiles) {
              console.log('Deleting: ' + file.name);
              await github.rest.repos.deleteFile({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: file.path,
                message: '[auto] ' + result + ' - cancel cadence for ' + company,
                sha: file.sha
              });
            }

      - name: Clean up this workflow
        if: steps.followup.outputs.result == 'DRAFT_CREATED' || steps.followup.outputs.result == 'REPLIED' || steps.followup.outputs.result == 'BOUNCED'
        uses: actions/github-script@v7
        with:
          script: |
            const path = '.github/workflows/followup_wyre_email3.yml';
            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: path
            });
            await github.rest.repos.deleteFile({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: path,
              message: '[auto] completed - Email 3 for Wyre',
              sha: file.sha
            });
