name: "Follow-up: 3 - Kroo"

on:
  schedule:
    - cron: '21 15 24 5 *'
  workflow_dispatch:

jobs:
  send-followup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run follow-up script
        id: followup
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          COMPANY_NAME: "Kroo"
          FOUNDER_NAME: "Barry Chiu"
          FOUNDER_EMAIL: "barry@getkroo.com"
          COMPANY_DOMAIN: "getkroo.com"
          ORIGINAL_THREAD_ID: "19e36d8c77a3142d"
          ORIGINAL_MESSAGE_ID: "19e36d8c77a3142d"
          EMAIL_SUBJECT: "Building the data layer for GCs | Telescope intro"
          EMAIL_BODY: "<div>Hey Barry,<br><br>One last note. I was chatting with a GC recently who told me they have 14 different software systems and zero way to get a unified view of a project's health. Felt like exactly the problem Kroo is solving. If now isn't the right time, totally understand. But if there's ever a window to connect I'd love to hear how things are going.</div>"
          EMAIL_NUMBER: "3"
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          OUTREACH_API_KEY: ${{ secrets.OUTREACH_API_KEY }}
        run: node scripts/send_followup.js

      - name: Cancel remaining cadence
        if: steps.followup.outputs.result == 'REPLIED' || steps.followup.outputs.result == 'BOUNCED'
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ steps.followup.outputs.result }}';
            const company = 'kroo';
            console.log(result + ': Cleaning up remaining workflows for ' + company);
            const { data: contents } = await github.rest.repos.getContent({
              owner: context.repo.owner, repo: context.repo.repo, path: '.github/workflows'
            });
            const companyFiles = contents.filter(f => f.name.startsWith('followup_' + company + '_'));
            for (const file of companyFiles) {
              await github.rest.repos.deleteFile({
                owner: context.repo.owner, repo: context.repo.repo, path: file.path,
                message: '[auto] ' + result + ' - cancel cadence for ' + company, sha: file.sha
              });
            }

      - name: Clean up this workflow
        if: steps.followup.outputs.result == 'DRAFT_CREATED' || steps.followup.outputs.result == 'REPLIED' || steps.followup.outputs.result == 'BOUNCED'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner, repo: context.repo.repo, path: '.github/workflows/followup_kroo_email3.yml'
            });
            await github.rest.repos.deleteFile({
              owner: context.repo.owner, repo: context.repo.repo, path: '.github/workflows/followup_kroo_email3.yml',
              message: '[auto] completed - Email 3 for Kroo', sha: file.sha
            });