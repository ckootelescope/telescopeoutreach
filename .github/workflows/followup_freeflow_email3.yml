name: "Follow-up: 3 - Freeflow"

on:
  schedule:
    - cron: '50 15 25 5 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-followup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run follow-up script
        id: followup
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          COMPANY_NAME: "Freeflow"
          FOUNDER_NAME: "Jason"
          FOUNDER_EMAIL: "jason@freeflow.ai"
          COMPANY_DOMAIN: "freeflow.ai"
          ORIGINAL_THREAD_ID: "19e3cced39f867a7"
          ORIGINAL_MESSAGE_ID: "19e3cced39f867a7"
          EMAIL_SUBJECT: "Telescope Partners <> Freeflow Intro"
          EMAIL_BODY: "<div>Hey Jason, Chris works closely with the iLife team and a few other insurance-focused companies in our portfolio. The appetite for AI tooling across the claims workflow keeps growing. Happy to make intros if helpful.<br><br>If now isn't the right time, totally understand. But would love to connect whenever there's a window.</div>"
          EMAIL_NUMBER: "3"
        run: node scripts/send_followup.js

      - name: Cancel remaining cadence
        if: steps.followup.outputs.result == 'REPLIED' || steps.followup.outputs.result == 'BOUNCED'
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ steps.followup.outputs.result }}';
            const company = 'freeflow';
            console.log(result + ': Cleaning up remaining workflows for ' + company);
            const { data: contents } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: '.github/workflows'
            });
            const companyFiles = contents.filter(f => f.name.startsWith('followup_' + company + '_'));
            for (const file of companyFiles) {
              console.log('Deleting: ' + file.name);
              await github.rest.repos.deleteFile({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: file.path,
                message: '[auto] ' + result + ' - cancel cadence for ' + company,
                sha: file.sha
              });
            }

      - name: Clean up this workflow
        if: steps.followup.outputs.result == 'DRAFT_CREATED' || steps.followup.outputs.result == 'REPLIED' || steps.followup.outputs.result == 'BOUNCED'
        uses: actions/github-script@v7
        with:
          script: |
            const path = '.github/workflows/followup_freeflow_email3.yml';
            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: path
            });
            await github.rest.repos.deleteFile({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: path,
              message: '[auto] completed - Email 3 for Freeflow',
              sha: file.sha
            });
