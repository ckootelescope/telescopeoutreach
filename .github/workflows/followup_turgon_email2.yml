name: "Follow-up: 2 - Turgon"

on:
  schedule:
    - cron: '31 15 21 5 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-followup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run follow-up script
        id: followup
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          COMPANY_NAME: "Turgon"
          FOUNDER_NAME: "Ankur Varma"
          FOUNDER_EMAIL: "ankur@turgon.ai"
          COMPANY_DOMAIN: "turgon.ai"
          ORIGINAL_THREAD_ID: "19e41b1e4f437ff8"
          ORIGINAL_MESSAGE_ID: "19e41b1e4f437ff8"
          EMAIL_SUBJECT: "Telescope Partners <> Turgon intro"
          EMAIL_BODY: "<div>Hey Ankur,<br><br>Was reading about SAP's push at Sapphire this year and the messaging is all about AI agents and clean core, but every IT leader I talk to says the gap between SAP's vision and their actual environment is massive. Most of them are running 15-year-old customizations they're afraid to touch. Curious how the DynPro partnership is changing the types of deals you can go after.<br><br>Would love to get 20 minutes if you're open to it.</div>"
          EMAIL_NUMBER: "2"
        run: node scripts/send_followup.js

      - name: Cancel remaining cadence
        if: steps.followup.outputs.result == 'REPLIED' || steps.followup.outputs.result == 'BOUNCED'
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ steps.followup.outputs.result }}';
            const company = 'turgon';
            console.log(result + ': Cleaning up remaining workflows for ' + company);
            const { data: contents } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: '.github/workflows'
            });
            const companyFiles = contents.filter(f => f.name.startsWith('followup_' + company + '_'));
            for (const file of companyFiles) {
              console.log('Deleting: ' + file.name);
              await github.rest.repos.deleteFile({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: file.path,
                message: '[auto] ' + result + ' - cancel cadence for ' + company,
                sha: file.sha
              });
            }

      - name: Clean up this workflow
        if: steps.followup.outputs.result == 'DRAFT_CREATED' || steps.followup.outputs.result == 'REPLIED' || steps.followup.outputs.result == 'BOUNCED'
        uses: actions/github-script@v7
        with:
          script: |
            const path = '.github/workflows/followup_turgon_email2.yml';
            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: path
            });
            await github.rest.repos.deleteFile({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: path,
              message: '[auto] completed - Email 2 for COMPANY_NAME_VALUE',
              sha: file.sha
            });
