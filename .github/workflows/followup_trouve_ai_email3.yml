name: "Follow-up: 3 - Trouve AI"

on:
  schedule:
    - cron: '39 15 24 5 *'
  workflow_dispatch:

jobs:
  send-followup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run follow-up script
        id: followup
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          COMPANY_NAME: "Trouve AI"
          FOUNDER_NAME: "Shafin Siddique"
          FOUNDER_EMAIL: "shafin@trouve.ai"
          COMPANY_DOMAIN: "trouve.ai"
          ORIGINAL_THREAD_ID: "19e36fcd57677a64"
          ORIGINAL_MESSAGE_ID: "19e36fcd57677a64"
          EMAIL_SUBJECT: "AI agents for CRM ops | Telescope intro"
          EMAIL_BODY: "<div>Hey Shafin,<br><br>One more thing I wanted to share. We've been talking to a few portfolio companies recently who are spending 6 figures a year on Salesforce consultants just to keep their instance running the way they want. The pain is real and it's recurring, which is what makes the Trouve approach so compelling. If now isn't the right time, totally understand. But would love to trade notes whenever you have a window.</div>"
          EMAIL_NUMBER: "3"
        run: node scripts/send_followup.js

      - name: Cancel remaining cadence
        if: steps.followup.outputs.result == 'REPLIED' || steps.followup.outputs.result == 'BOUNCED'
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ steps.followup.outputs.result }}';
            const company = 'trouve_ai';
            console.log(result + ': Cleaning up remaining workflows for ' + company);
            const { data: contents } = await github.rest.repos.getContent({
              owner: context.repo.owner, repo: context.repo.repo, path: '.github/workflows'
            });
            const companyFiles = contents.filter(f => f.name.startsWith('followup_' + company + '_'));
            for (const file of companyFiles) {
              await github.rest.repos.deleteFile({
                owner: context.repo.owner, repo: context.repo.repo, path: file.path,
                message: '[auto] ' + result + ' - cancel cadence for ' + company, sha: file.sha
              });
            }

      - name: Clean up this workflow
        if: steps.followup.outputs.result == 'DRAFT_CREATED' || steps.followup.outputs.result == 'REPLIED' || steps.followup.outputs.result == 'BOUNCED'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner, repo: context.repo.repo, path: '.github/workflows/followup_trouve_ai_email3.yml'
            });
            await github.rest.repos.deleteFile({
              owner: context.repo.owner, repo: context.repo.repo, path: '.github/workflows/followup_trouve_ai_email3.yml',
              message: '[auto] completed - Email 3 for Trouve AI', sha: file.sha
            });