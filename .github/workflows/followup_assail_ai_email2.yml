name: "Follow-up: 2 - Assail AI"
 
on:
  schedule:
    - cron: '44 15 20 5 *'
  workflow_dispatch:
 
jobs:
  send-followup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Run follow-up script
        id: followup
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          COMPANY_NAME: "Assail AI"
          FOUNDER_NAME: "Alissa Knight"
          FOUNDER_EMAIL: "alissa.knight@assailai.com"
          COMPANY_DOMAIN: "assailai.com"
          ORIGINAL_THREAD_ID: "19e3be35d5296cb4"
          ORIGINAL_MESSAGE_ID: "19e3be35d5296cb4"
          EMAIL_SUBJECT: "Telescope <> Assail AI Intro"
          EMAIL_BODY: "<div>Hey Alissa,<br><br>The more I dig into API security the more it feels like most tools are built for finding vulnerabilities but not actually testing them the way an attacker would. Offensive testing that simulates real attacks against live APIs is a different category entirely. Curious how enterprises are thinking about the shift from passive scanning to active testing.<br><br>Would love to get 20 minutes if you're open to it.</div>"
          EMAIL_NUMBER: "2"
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          OUTREACH_API_KEY: ${{ secrets.OUTREACH_API_KEY }}
        run: node scripts/send_followup.js
 
      - name: Cancel remaining cadence
        if: steps.followup.outputs.result == 'REPLIED' || steps.followup.outputs.result == 'BOUNCED'
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ steps.followup.outputs.result }}';
            const company = 'assail_ai';
            console.log(result + ': Cleaning up remaining workflows for ' + company);
            const { data: contents } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: '.github/workflows'
            });
            const companyFiles = contents.filter(f => f.name.startsWith('followup_' + company + '_'));
            for (const file of companyFiles) {
              console.log('Deleting: ' + file.name);
              await github.rest.repos.deleteFile({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: file.path,
                message: '[auto] ' + result + ' - cancel cadence for ' + company,
                sha: file.sha
              });
            }
 
      - name: Clean up this workflow
        if: steps.followup.outputs.result == 'DRAFT_CREATED' || steps.followup.outputs.result == 'REPLIED' || steps.followup.outputs.result == 'BOUNCED'
        uses: actions/github-script@v7
        with:
          script: |
            const path = '.github/workflows/followup_assail_ai_email2.yml';
            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: path
            });
            await github.rest.repos.deleteFile({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: path,
              message: '[auto] completed - Email 2 for Assail AI',
              sha: file.sha
            });
