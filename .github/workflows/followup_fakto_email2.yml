name: "Follow-up: 2 - Fakto"

on:
  schedule:
    - cron: '37 15 21 5 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-followup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run follow-up script
        id: followup
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          COMPANY_NAME: "Fakto"
          FOUNDER_NAME: "Nicolas Vecchioli"
          FOUNDER_EMAIL: "nicolas@fakto.ai"
          COMPANY_DOMAIN: "fakto.ai"
          ORIGINAL_THREAD_ID: "19e41cac3eff3e48"
          ORIGINAL_MESSAGE_ID: "19e41cac3eff3e48"
          EMAIL_SUBJECT: "Telescope Partners <> Fakto Intro"
          EMAIL_BODY: "<div>Hey Nicolas,<br><br>Was looking at some procurement data recently and the stat that companies lose 2-5% of supplier spend to billing errors is wild when you think about the dollar amounts involved. For a company spending $500M with suppliers, that's $10-25M walking out the door every year and most finance teams don't even know it's happening. Curious how customers typically discover the problem, whether they come looking for it or Fakto surfaces it for them.<br><br>Would love to get 20 minutes if you're open to it.</div>"
          EMAIL_NUMBER: "2"
        run: node scripts/send_followup.js

      - name: Cancel remaining cadence
        if: steps.followup.outputs.result == 'REPLIED' || steps.followup.outputs.result == 'BOUNCED'
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ steps.followup.outputs.result }}';
            const company = 'fakto';
            console.log(result + ': Cleaning up remaining workflows for ' + company);
            const { data: contents } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: '.github/workflows'
            });
            const companyFiles = contents.filter(f => f.name.startsWith('followup_' + company + '_'));
            for (const file of companyFiles) {
              console.log('Deleting: ' + file.name);
              await github.rest.repos.deleteFile({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: file.path,
                message: '[auto] ' + result + ' - cancel cadence for ' + company,
                sha: file.sha
              });
            }

      - name: Clean up this workflow
        if: steps.followup.outputs.result == 'DRAFT_CREATED' || steps.followup.outputs.result == 'REPLIED' || steps.followup.outputs.result == 'BOUNCED'
        uses: actions/github-script@v7
        with:
          script: |
            const path = '.github/workflows/followup_fakto_email2.yml';
            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: path
            });
            await github.rest.repos.deleteFile({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: path,
              message: '[auto] completed - Email 2 for COMPANY_NAME_VALUE',
              sha: file.sha
            });
