name: "Follow-up: 2 - Compuvi"
 
on:
  schedule:
    - cron: '15 15 20 5 *'
  workflow_dispatch:
 
jobs:
  send-followup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Run follow-up script
        id: followup
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          COMPANY_NAME: "Compuvi"
          FOUNDER_NAME: "Ataberk Ciftlikli"
          FOUNDER_EMAIL: "ataberk@compuvi.com"
          COMPANY_DOMAIN: "compuvi.com"
          ORIGINAL_THREAD_ID: "19e3d8608598459e"
          ORIGINAL_MESSAGE_ID: "19e3d8608598459e"
          EMAIL_SUBJECT: "Telescope <> Compuvi Intro"
          EMAIL_BODY: "<div>Hey Ataberk,<br><br>Was reading about the latest round of regulatory enforcement actions and the fines for communication compliance failures keep getting bigger. One firm got hit for over 100M just because they couldn't prove they were monitoring employee communications properly. I think the companies that solve this without making every employee feel like they're being surveilled are going to win big here. Curious how you think about the balance between coverage and user experience.<br><br>Would love to get 20 minutes if you're open to it.</div>"
          EMAIL_NUMBER: "2"
        run: node scripts/send_followup.js
 
      - name: Cancel remaining cadence
        if: steps.followup.outputs.result == 'REPLIED' || steps.followup.outputs.result == 'BOUNCED'
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ steps.followup.outputs.result }}';
            const company = 'compuvi';
            console.log(result + ': Cleaning up remaining workflows for ' + company);
            const { data: contents } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: '.github/workflows'
            });
            const companyFiles = contents.filter(f => f.name.startsWith('followup_' + company + '_'));
            for (const file of companyFiles) {
              console.log('Deleting: ' + file.name);
              await github.rest.repos.deleteFile({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: file.path,
                message: '[auto] ' + result + ' - cancel cadence for ' + company,
                sha: file.sha
              });
            }
 
      - name: Clean up this workflow
        if: steps.followup.outputs.result == 'DRAFT_CREATED' || steps.followup.outputs.result == 'REPLIED' || steps.followup.outputs.result == 'BOUNCED'
        uses: actions/github-script@v7
        with:
          script: |
            const path = '.github/workflows/followup_compuvi_email2.yml';
            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: path
            });
            await github.rest.repos.deleteFile({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: path,
              message: '[auto] completed - Email 2 for Compuvi',
              sha: file.sha
            });
