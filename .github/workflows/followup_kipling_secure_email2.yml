name: "Follow-up: 2 - Kipling Secure"

on:
  schedule:
    - cron: '39 15 19 5 *'
  workflow_dispatch:

jobs:
  send-followup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run follow-up script
        id: followup
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          COMPANY_NAME: "Kipling Secure"
          FOUNDER_NAME: "Saurabh Sandhir"
          FOUNDER_EMAIL: "saurabh@kiplingsecure.ai"
          COMPANY_DOMAIN: "kiplingsecure.ai"
          ORIGINAL_THREAD_ID: "19e36dcf0b3defc5"
          ORIGINAL_MESSAGE_ID: "19e36dcf0b3defc5"
          EMAIL_SUBJECT: "AI-native security for MSPs | Telescope intro"
          EMAIL_BODY: "<div>Hey Saurabh,<br><br>Wanted to follow up with a quick thought. I've been talking to a few MSP-focused companies in our network and the consistent theme is that MSPs are getting hammered with more sophisticated attacks but their security tooling hasn't kept up. Most are stitching together 3-4 different products that don't talk to each other. The single-platform approach Kipling is taking feels like the right answer. Curious how the early MSP conversations are going and whether you're seeing more pull from the channel or direct.<br><br>Would love to get 20 minutes if you're open to it.</div>"
          EMAIL_NUMBER: "2"
        run: node scripts/send_followup.js

      - name: Cancel remaining cadence
        if: steps.followup.outputs.result == 'REPLIED' || steps.followup.outputs.result == 'BOUNCED'
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ steps.followup.outputs.result }}';
            const company = 'kipling_secure';
            console.log(result + ': Cleaning up remaining workflows for ' + company);
            const { data: contents } = await github.rest.repos.getContent({
              owner: context.repo.owner, repo: context.repo.repo, path: '.github/workflows'
            });
            const companyFiles = contents.filter(f => f.name.startsWith('followup_' + company + '_'));
            for (const file of companyFiles) {
              await github.rest.repos.deleteFile({
                owner: context.repo.owner, repo: context.repo.repo, path: file.path,
                message: '[auto] ' + result + ' - cancel cadence for ' + company, sha: file.sha
              });
            }

      - name: Clean up this workflow
        if: steps.followup.outputs.result == 'DRAFT_CREATED' || steps.followup.outputs.result == 'REPLIED' || steps.followup.outputs.result == 'BOUNCED'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner, repo: context.repo.repo, path: '.github/workflows/followup_kipling_secure_email2.yml'
            });
            await github.rest.repos.deleteFile({
              owner: context.repo.owner, repo: context.repo.repo, path: '.github/workflows/followup_kipling_secure_email2.yml',
              message: '[auto] completed - Email 2 for Kipling Secure', sha: file.sha
            });