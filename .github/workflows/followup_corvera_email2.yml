name: "Follow-up: 2 - Corvera"
 
on:
  schedule:
    - cron: '13 15 21 5 *'
  workflow_dispatch:
 
jobs:
  send-followup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Run follow-up script
        id: followup
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          COMPANY_NAME: "Corvera"
          FOUNDER_NAME: "Chris"
          FOUNDER_EMAIL: "chris@corvera.ai"
          COMPANY_DOMAIN: "corvera.ai"
          ORIGINAL_THREAD_ID: "19e4121dc37379ec"
          ORIGINAL_MESSAGE_ID: "19e4121dc37379ec"
          EMAIL_SUBJECT: "Telescope Partners <> Corvera Intro"
          EMAIL_BODY: "<div>Hey Chris,<br><br>Been talking to more CPG operators and the order management problem goes deeper than I initially thought. It's not just that orders are manual, it's that every retailer sends them in a different format, so the ops team spends half their day just translating before they can even process anything. Curious what the typical ramp looks like when a brand switches over.<br><br>Would love to get 20 minutes if you're open to it.</div>"
          EMAIL_NUMBER: "2"
        run: node scripts/send_followup.js
 
      - name: Cancel remaining cadence
        if: steps.followup.outputs.result == 'REPLIED' || steps.followup.outputs.result == 'BOUNCED'
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ steps.followup.outputs.result }}';
            const company = 'corvera';
            console.log(result + ': Cleaning up remaining workflows for ' + company);
            const { data: contents } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: '.github/workflows'
            });
            const companyFiles = contents.filter(f => f.name.startsWith('followup_' + company + '_'));
            for (const file of companyFiles) {
              console.log('Deleting: ' + file.name);
              await github.rest.repos.deleteFile({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: file.path,
                message: '[auto] ' + result + ' - cancel cadence for ' + company,
                sha: file.sha
              });
            }
 
      - name: Clean up this workflow
        if: steps.followup.outputs.result == 'DRAFT_CREATED' || steps.followup.outputs.result == 'REPLIED' || steps.followup.outputs.result == 'BOUNCED'
        uses: actions/github-script@v7
        with:
          script: |
            const path = '.github/workflows/followup_corvera_email2.yml';
            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: path
            });
            await github.rest.repos.deleteFile({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: path,
              message: '[auto] completed - Email 2 for COMPANY_NAME_VALUE',
              sha: file.sha
            });
