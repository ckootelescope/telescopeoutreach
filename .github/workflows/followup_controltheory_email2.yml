name: "Follow-up: 2 - ControlTheory"

on:
  schedule:
    - cron: '47 15 20 5 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-followup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run follow-up script
        id: followup
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          COMPANY_NAME: "ControlTheory"
          FOUNDER_NAME: "Bob"
          FOUNDER_EMAIL: "bob@controltheory.com"
          COMPANY_DOMAIN: "controltheory.com"
          ORIGINAL_THREAD_ID: "19e3d1750c4351a5"
          ORIGINAL_MESSAGE_ID: "19e3d1750c4351a5"
          EMAIL_SUBJECT: "Telescope Partners <> ControlTheory"
          EMAIL_BODY: "<div>Hey Bob,<br><br>Been thinking more about the production debugging problem. One thing that keeps coming up in my conversations is how much time developers spend just trying to reproduce issues, sometimes days before they even start fixing anything. If you can cut that loop down to minutes, the ROI for engineering teams is massive. Curious how you're seeing adoption play out with larger teams.<br><br>Would love to get 20 minutes if you're open to it.</div>"
          EMAIL_NUMBER: "2"
        run: node scripts/send_followup.js

      - name: Cancel remaining cadence
        if: steps.followup.outputs.result == 'REPLIED' || steps.followup.outputs.result == 'BOUNCED'
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ steps.followup.outputs.result }}';
            const company = 'controltheory';
            console.log(result + ': Cleaning up remaining workflows for ' + company);
            const { data: contents } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: '.github/workflows'
            });
            const companyFiles = contents.filter(f => f.name.startsWith('followup_' + company + '_'));
            for (const file of companyFiles) {
              console.log('Deleting: ' + file.name);
              await github.rest.repos.deleteFile({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: file.path,
                message: '[auto] ' + result + ' - cancel cadence for ' + company,
                sha: file.sha
              });
            }

      - name: Clean up this workflow
        if: steps.followup.outputs.result == 'DRAFT_CREATED' || steps.followup.outputs.result == 'REPLIED' || steps.followup.outputs.result == 'BOUNCED'
        uses: actions/github-script@v7
        with:
          script: |
            const path = '.github/workflows/followup_controltheory_email2.yml';
            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: path
            });
            await github.rest.repos.deleteFile({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: path,
              message: '[auto] completed - Email 2 for ControlTheory',
              sha: file.sha
            });
