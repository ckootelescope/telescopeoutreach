name: "Follow-up Scheduler"

on:
  schedule:
    - cron: '0 15 * * *'
    - cron: '0 16 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-followups:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run scheduled follow-ups
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
        run: node scripts/run_scheduler.js

      - name: Commit updated config
        run: |
          git config user.name "telescope-bot"
          git config user.email "calvin@telescopepartners.com"
          git add followups.json
          git diff --quiet --cached || git commit -m "[auto] update followup status"
          git push
